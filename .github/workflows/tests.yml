name: test

on:
  workflow_call:
  schedule: # run weekly
    - cron: "0 12 * * 0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: "3.12"
      - name: Run tests
        run: |
          uv run python -m pytest
